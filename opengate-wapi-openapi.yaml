components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Dashboard:
      type: object
      properties:
        _id:
          type: string
          example: "989293eb-56bc-4ff1-dab9-4e3d2941f193"
        id:
          type: string
          example: "989293eb-56bc-4ff1-dab9-4e3d2941f193"
        title:
          type: string
          example: "Listado entidades"
        description:
          type: string
          nullable: true
        icon:
          type: string
          example: "fa-tachometer"
        iconType:
          type: string
          example: "icon"
        owner:
          type: string
          example: "root@amplia.es"
        workspaces:
          type: string
          example: "_root@amplia.es_default"
        users:
          type: array
          items:
            type: string
        workgroups:
          type: array
          items:
            type: string
        allowedProfiles:
          type: array
          items:
            type: string
          example: ["root", "super_admin_domain", "admin_domain", "admin", "advanced", "viewer"]
        domains:
          type: array
          items:
            type: string
        lastAccess:
          type: string
          format: date-time
          example: "2026-05-06T10:16:17.451Z"
        editable:
          type: boolean
          example: true
        backgroundImage:
          type: string
          nullable: true
        bannerImage:
          type: string
          nullable: true
        __v:
          type: integer
          example: 10
        extraConfig:
          $ref: '#/components/schemas/DashboardExtraConfig'
        grid:
          type: array
          items:
            $ref: '#/components/schemas/GridItem'
        templateConfig:
          type: object
          nullable: true

    DashboardExtraConfig:
      type: object
      properties:
        cellsWidth:
          type: string
          example: ""
        cellHeight:
          type: integer
          example: 145
        dashboardRefreshInterval:
          type: string
          example: ""
        showBanner:
          type: boolean
          example: false
        favourite:
          type: boolean
          example: false

    GridItem:
      type: object
      properties:
        width:
          type: integer
        height:
          type: integer
        x:
          type: integer
        y:
          type: integer
        w:
          type: integer
        h:
          type: integer
        i:
          type: string
        moved:
          type: boolean
        definition:
          $ref: '#/components/schemas/WidgetDefinition'

    WidgetDefinition:
      type: object
      properties:
        type:
          type: string
          example: "deviceInfoDetails"
        wid:
          type: string
          example: "1756972661738-1"
        config:
          type: object
          additionalProperties: true

    Workspace:
      type: object
      properties:
        _id:
          type: string
          example: "_root@amplia.es_default"
        name:
          type: string
          example: "Default"
        description:
          type: string
          nullable: true
          example: "root@amplia.es workspace"
        owner:
          type: string
          example: "root@amplia.es"
        image:
          type: string
          nullable: true
        icon:
          type: string
          example: "fa-user"
        users:
          type: array
          items:
            type: string
        domains:
          type: array
          items:
            type: string
          example: ["chemacorp_fr", "chemacorp_nofr"]
        workgroups:
          type: array
          items:
            type: string
        actions:
          type: array
          items:
            type: string
          example: ["createDomain", "createBundle", "executeOperation"]
        widgets:
          type: array
          items:
            type: string
        widget_action:
          type: object
          additionalProperties:
            type: string
          example:
            editRuleConfiguration: "ruleConfigurations"
            editDevice: "entities"
        allowedProfiles:
          type: array
          items:
            type: string
          example: ["root", "super_admin_domain", "admin_domain"]
        dashboards:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceDashboard'
        priority:
          type: integer
          example: 1
        color:
          type: string
          example: "#ff0000"
        lastAccess:
          type: string
          format: date-time
          example: "2025-04-22T06:14:18.679Z"
        editable:
          type: boolean
          example: true
        __v:
          type: integer
        _editMode:
          type: boolean
        others:
          $ref: '#/components/schemas/WorkspaceOthers'
        menu:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceMenuItem'
        menu_tree:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/WorkspaceMenuCategory'

    WorkspaceOthers:
      type: object
      properties:
        showInHome:
          type: boolean
          example: true
        mode:
          type: string
          example: "grid"
        bannerImage:
          type: string
          nullable: true
          example: "http://urltoimage"

    WorkspaceDashboard:
      type: object
      properties:
        x:
          type: integer
          example: 0
        y:
          type: integer
          example: 0
        width:
          type: integer
          example: 2
        height:
          type: integer
          example: 1
        w:
          type: integer
          example: 2
        h:
          type: integer
          example: 1
        i:
          type: string
          example: "989293eb-56bc-4ff1-dab9-4e3d2941f193"
        moved:
          type: boolean
          example: false
        id:
          type: string
          example: "989293eb-56bc-4ff1-dab9-4e3d2941f193"
        dashboard:
          $ref: '#/components/schemas/DashboardSimplified'

    WorkspaceMenuItem:
      type: object
      properties:
        title:
          type: string
        action:
          type: string
        permission:
          type: string
        icon:
          type: string
        menu:
          type: string
        menuCfg:
          type: object
          properties:
            icon:
              type: string
            title:
              type: string

    WorkspaceMenuCategory:
      type: object
      properties:
        config:
          type: object
          properties:
            icon:
              type: string
            title:
              type: string
        actions:
          type: array
          items:
            $ref: '#/components/schemas/WorkspaceMenuItem'

    DashboardSimplified:
      type: object
      properties:
        extraConfig:
          $ref: '#/components/schemas/DashboardExtraConfig'
        _id:
          type: string
          example: "989293eb-56bc-4ff1-dab9-4e3d2941f193"
        id:
          type: string
          example: "989293eb-56bc-4ff1-dab9-4e3d2941f193"
        title:
          type: string
          example: "Listado entidades"
        description:
          type: string
          nullable: true
        icon:
          type: string
          example: "fa-tachometer"
        iconType:
          type: string
          example: "icon"
        owner:
          type: string
          example: "root@amplia.es"
        workspaces:
          type: string
          example: "_root@amplia.es_default"
        users:
          type: array
          items:
            type: string
        workgroups:
          type: array
          items:
            type: string
        allowedProfiles:
          type: array
          items:
            type: string
        domains:
          type: array
          items:
            type: string
        lastAccess:
          type: string
          format: date-time
          example: "2026-05-06T10:16:17.451Z"
        editable:
          type: boolean
          example: true
        backgroundImage:
          type: string
          nullable: true
        bannerImage:
          type: string
          nullable: true
        __v:
          type: integer
          example: 10
        templateConfig:
          type: object
          nullable: true
