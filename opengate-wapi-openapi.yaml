  /users/session:
    get:
      tags: [Users]
      summary: Dummy session check
      responses:
        '200':
          description: Successful operation

  # widgetDefaults.js
  /scripts/widgetDefaults:
    get:
      tags: [WidgetDefaults]
      summary: Get all widget configurations for a domain
      responses:
        '200':
          description: Successful operation

  /scripts/widgetDefaults/{typeWidget}:
