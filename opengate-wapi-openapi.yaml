      summary: Update a template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    get:
      tags: [Templates]
      summary: Get a template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags: [Templates]
      summary: Delete a template
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /templates:
    put:
      tags: [Templates]
      summary: Save templates
      responses:
        '200':
          description: Successful operation
    post:
      tags: [Templates]
      summary: Save a template
      responses:
        '201':
          description: Created

  /templates/workspaces/{workspacesId}:
    get:
      tags: [Templates]
      summary: Get templates by workspace
      parameters:
        - name: workspacesId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    post:
      tags: [Templates]
      summary: Get templates by workspace (POST)
      parameters:
        - name: workspacesId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /templates/resourceType/{resourceType}/{workspaces}/{specificType}/{templateName}:
    get:
      tags: [Templates]
      summary: Get templates by resource type
      parameters:
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: workspaces
          in: path
          required: true
          schema:
            type: string
        - name: specificType
          in: path
          required: true
          schema:
            type: string
        - name: templateName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /templates/{templateId}/workspaces/{workspaceId}:
    delete:
      tags: [Templates]
      summary: Delete template from workspace
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /templates/workspaces/{workspacesId}/datastreams:
    post:
      tags: [Templates]
      summary: Get templates by datastreams
      parameters:
        - name: workspacesId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /templates/workspaces:
    post:
      tags: [Templates]
      summary: Get templates by workspace
      responses:
        '200':
          description: Successful operation

  /templates/resourceType/{resourceType}/{templateName}:
    post:
      tags: [Templates]
      summary: Get templates by resource type (POST)
      parameters:
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: templateName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  # user.js
  /users/{email}:
    put:
      tags: [Users]
      summary: Update a user
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    get:
      tags: [Users]
      summary: Read a user
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags: [Users]
      summary: Delete a user
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /users:
    post:
      tags: [Users]
      summary: Create a user
      responses:
        '201':
          description: Created

  /users/find:
    post:
      tags: [Users]
      summary: Find users by email
      responses:
        '200':
          description: Successful operation

  # user_friendly.js
  /users/{email}/notifications:
    put:
      tags: [Users]
      summary: Toggle user notifications
      parameters:
