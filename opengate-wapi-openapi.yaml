openapi: 3.0.0
info:
  title: OpenGate Web API
  description: API definition for the OpenGate Web API resources.
  version: 1.0.0
servers:
  - url: /api/v1
    description: Local API
security:
  - bearerAuth: []
tags:
  - name: Blueprints
    description: Operations related to blueprints
  - name: Dashboards
    description: Operations related to dashboards
  - name: Domains
    description: Operations related to domains
  - name: WizardViews
    description: Operations related to wizard views
  - name: Widgets
    description: Operations related to widgets and bundles
  - name: Logs
    description: Operations related to logging (Elasticsearch)
  - name: Files
    description: Operations related to file management
  - name: Formatter
    description: Operations related to script formatters
  - name: Auth
    description: Authentication operations
  - name: Lang
    description: Language and localization operations
  - name: OIDC
    description: OIDC configuration operations
  - name: Templates
    description: Operations related to templates
  - name: Users
    description: User management operations
  - name: WidgetDefaults
    description: Default configuration for widgets
  - name: Workspaces
    description: Operations related to workspaces
  - name: Wrapper
    description: API wrappers and proxies

paths:
  # blueprint.js
  /blueprints/{blueprintId}:
    put:
      tags: [Blueprints]
      summary: Save a blueprint
      parameters:
        - name: blueprintId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    get:
      tags: [Blueprints]
      summary: Load a blueprint
      parameters:
        - name: blueprintId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /blueprints:
    get:
      tags: [Blueprints]
      summary: Read all blueprints
      responses:
        '200':
          description: Successful operation

  /blueprints/domain/{domainId}:
    delete:
      tags: [Blueprints]
      summary: Delete blueprints by domain
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  # dashboard.js
  /dashboards/{dashboardId}:
    get:
      tags: [Dashboards]
      summary: Read a dashboard
      parameters:
        - name: dashboardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
    put:
      tags: [Dashboards]
      summary: Update a dashboard
      parameters:
        - name: dashboardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /dashboards/export/{dashboardId}:
    get:
      tags: [Dashboards]
      summary: Export a dashboard
      parameters:
        - name: dashboardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /dashboards/{dashboardId}/image:
    get:
      tags: [Dashboards]
      summary: Read dashboard image
      parameters:
        - name: dashboardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /dashboards/{dashboardId}/icon:
    get:
      tags: [Dashboards]
      summary: Read dashboard icon
      parameters:
        - name: dashboardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /dashboards/{dashboardId}/share:
    put:
      tags: [Dashboards]
      summary: Share a dashboard
      parameters:
        - name: dashboardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /dashboards/{dashboardId}/fav:
    put:
      tags: [Dashboards]
      summary: Toggle favorite status for a dashboard
      parameters:
        - name: dashboardId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /dashboards:
    post:
      tags: [Dashboards]
      summary: Create a dashboard
      responses:
        '201':
          description: Created
    delete:
      tags: [Dashboards]
      summary: Delete dashboards
      responses:
        '200':
          description: Successful operation

  # domain.js
  /domains:
    post:
      tags: [Domains]
      summary: Save a domain
      responses:
        '201':
          description: Created

  /domains/{domainName}:
    put:
      tags: [Domains]
      summary: Update a domain
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    get:
      tags: [Domains]
      summary: Load a domain
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags: [Domains]
      summary: Delete a domain
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  # domainWizardViews.js
  /wiwi/wizard/domain/views/{domainName}:
    get:
      tags: [WizardViews]
      summary: Get domain views
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    put:
      tags: [WizardViews]
      summary: Update domain views
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/wizard/entity/views/:
    post:
      tags: [WizardViews]
      summary: Post entity view
      responses:
        '201':
          description: Created

  /wiwi/wizard/entity/views/{viewname}:
    delete:
      tags: [WizardViews]
      summary: Delete entity view
      parameters:
        - name: viewname
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/wizard/entity/views/{viewname}/{domainName}:
    put:
      tags: [WizardViews]
      summary: Put entity view
      parameters:
        - name: viewname
          in: path
          required: true
          schema:
            type: string
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/wizard/entity/views/domain/{domainName}:
    delete:
      tags: [WizardViews]
      summary: Delete views by domain
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/wizard/domain/views:
    post:
      tags: [WizardViews]
      summary: Save domain views
      responses:
        '201':
          description: Created

  # domainwidgets.js
  /wiwi/{domainName}/actions:
    get:
      tags: [Widgets]
      summary: Read actions
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/{domainName}/actions/widgets:
    get:
      tags: [Widgets]
      summary: Read action widgets
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/{domainName}/bundles:
    post:
      tags: [Widgets]
      summary: Post a bundle
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created
    get:
      tags: [Widgets]
      summary: Get widgets for a domain
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/{domainName}/{childDomain}/bundles:
    get:
      tags: [Widgets]
      summary: Get widgets for a child domain
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: childDomain
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/{domainName}/bundles/{bundleName}:
    put:
      tags: [Widgets]
      summary: Update a bundle
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: bundleName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags: [Widgets]
      summary: Delete a widget
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: bundleName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    get:
      tags: [Widgets]
      summary: Get widget files
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: bundleName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/{domainName}/bundles/{bundleName}/bundle:
    get:
      tags: [Widgets]
      summary: Get a specific bundle
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: bundleName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/{domainName}/bundles/{bundleName}/vendor:
    get:
      tags: [Widgets]
      summary: Get vendor for a bundle
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: bundleName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/{domainName}/internal/bundles:
    post:
      tags: [Widgets]
      summary: Post internal bundle
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created

  /wiwi/{domainName}/internal/{childDomain}/bundles:
    put:
      tags: [Widgets]
      summary: Update internal bundle for child domain
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: childDomain
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/{domainName}/internal/bundles/{bundleName}:
    get:
      tags: [Widgets]
      summary: Get internal widget files
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: bundleName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/{domainName}/internal/{childDomain}/bundles/{bundleName}:
    get:
      tags: [Widgets]
      summary: Get internal widget files for child domain
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: childDomain
          in: path
          required: true
          schema:
            type: string
        - name: bundleName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /wiwi/domain/{domainName}:
    delete:
      tags: [Widgets]
      summary: Delete widgets by domain
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  # elasticsearch.js
  /log/{index}:
    post:
      tags: [Logs]
      summary: Set a log entry
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created

  # file.js
  /files/category/{category}:
    get:
      tags: [Files]
      summary: Read files by category
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /files/{fileId}/{downloadType}:
    get:
      tags: [Files]
      summary: Read a specific file for download
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
        - name: downloadType
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /files/{fileId}:
    get:
      tags: [Files]
      summary: Load a specific file
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    put:
      tags: [Files]
      summary: Save a specific file
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags: [Files]
      summary: Delete a specific file
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /files:
    get:
      tags: [Files]
      summary: Read all files
      responses:
        '200':
          description: Successful operation
    post:
      tags: [Files]
      summary: Store a new file
      responses:
        '201':
          description: Created

  /files/{fileId}/meta:
    put:
      tags: [Files]
      summary: Update file metadata
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /files/domain/{domainId}:
    delete:
      tags: [Files]
      summary: Delete files by domain
      parameters:
        - name: domainId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  # formatter.js
  /scripts/widgets/allScriptUser:
    get:
      tags: [Formatter]
      summary: List all scripts for a user
      responses:
        '200':
          description: Successful operation

  /scripts/widgets/{typeWidget}/{subtype}:
    get:
      tags: [Formatter]
      summary: List formatters by type and subtype
      parameters:
        - name: typeWidget
          in: path
          required: true
          schema:
            type: string
        - name: subtype
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    post:
      tags: [Formatter]
      summary: Create a user formatter
      parameters:
        - name: typeWidget
          in: path
          required: true
          schema:
            type: string
        - name: subtype
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Created

  /scripts/widgets/{typeWidget}/{subtype}/scripts:
    get:
      tags: [Formatter]
      summary: List user formatters by type and subtype
      parameters:
        - name: typeWidget
          in: path
          required: true
          schema:
            type: string
        - name: subtype
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /scripts/widgets/{formatterId}:
    get:
      tags: [Formatter]
      summary: List dashboards using a formatter
      parameters:
        - name: formatterId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    put:
      tags: [Formatter]
      summary: Update a user formatter
      parameters:
        - name: formatterId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags: [Formatter]
      summary: Delete a user formatter
      parameters:
        - name: formatterId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /scripts/widgets/{formatterId}/sharedScript:
    put:
      tags: [Formatter]
      summary: Share a script
      parameters:
        - name: formatterId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  # intenal.js
  /auth/signin/internal:
    post:
      tags: [Auth]
      summary: Sign in internally
      security: []
      responses:
        '200':
          description: Successful operation

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh user session
      responses:
        '200':
          description: Successful operation

  # lang.js
  /lang:
    post:
      tags: [Lang]
      summary: Create a language
      responses:
        '201':
          description: Created

  /lang/{domain}/{langCode}:
    get:
      tags: [Lang]
      summary: Read language by domain and code
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
        - name: langCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /langs/{domain}:
    get:
      tags: [Lang]
      summary: Read all languages by domain
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /lang/{domain}:
    delete:
      tags: [Lang]
      summary: Delete languages by domain
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  # oidc.js
  /oidcs:
    get:
      tags: [OIDC]
